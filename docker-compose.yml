version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - LLM_LAB_ADMIN_TOKEN=${LLM_LAB_ADMIN_TOKEN:-admin-demo-token}
      - LLM_LAB_EDITOR_TOKEN=${LLM_LAB_EDITOR_TOKEN:-editor-demo-token}
      - LLM_LAB_READER_TOKEN=${LLM_LAB_READER_TOKEN:-reader-demo-token}
      - LLM_LAB_ENABLE_VULNERABLE_DEMO=${LLM_LAB_ENABLE_VULNERABLE_DEMO:-false}
      - LLM_LAB_USE_REAL_LLM=${LLM_LAB_USE_REAL_LLM:-false}
      - LLM_LAB_JWT_SECRET=${LLM_LAB_JWT_SECRET:-change-me-in-production}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - lab-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  lab-data:
